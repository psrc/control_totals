#----------------------------
# Pypyr steps
#----------------------------
steps:
 - steps.data_loading.initialize_hdf5 # deletes existing hdf5 file
 - steps.data_loading.get_elmer_data # pulls data from elmer database and saves to hdf5
 - steps.data_loading.load_data # loads data from csv files into hdf5
 - steps.geoprocessing.create_control_area_geography # creates control area geography by unioning and dissolving regional geographies, military bases, tribal areas, and natural resource areas together
 - steps.geoprocessing.flag_hct_parcels # creates hct buffers around transit points and flags parcels that fall within those buffers
 - steps.geoprocessing.block_control_area_xwalk # creates block to control area crosswalk
 - steps.geoprocessing.parcel_control_area_xwalks # creates parcel to control area crosswalk
 - steps.data_loading.get_census_data # pulls decennial census data from api and saves to hdf5
 - steps.data_loading.prepare_parcel_data # aggregates parcel data to control area
 - steps.data_loading.prepare_block_data # aggregates decennial block data to control area

 - steps.split_unincorporated_kitsap_housing_targets # fills in missing Kitsap housing unit growth targets
 - steps.adjust_targets_to_base_year # adjusts targets to base year using ofm and employment data
 - steps.king_cnty_targets # calculates targets for King County
 - steps.units_chg_targets # calculates targets that use housing unit change
 - steps.emp_chg_targets_res_con # calculates targets for counties that include resource and construction employment
 - steps.emp_chg_targets_no_res_con # calculates targets for counties that exclude resource and construction employment
 - steps.extrapolate_to_controls_year # extrapolates out to the control totals end year from the targets end year
 - steps.create_controls # creates final control totals table by bringing in the non-growth areas

#  - steps.parcels_capacity # calculates capacities
 - steps.create_control_totals_rebased_targets # creates rebased targets and interpolated control totals in Python
 - steps.load_split_hct_base_data # loads split HCT base data from mysql into pipeline.h5
 - steps.split_ct_to_hct # splits control totals into HCT and non-HCT parts in Python